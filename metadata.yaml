abstract: |-
  A firm grows from one hundred units to one hundred and twenty after hiring ten people, and every available theory of value answers the question of who made the twenty badly: labor-value accounting hands it to an undifferentiated substance called labor, marginal-product accounting books it to whoever was measured last, and bonus arithmetic divides it by headcount. The question is a credit-assignment problem, the same one reinforcement learning has carried since its founding, and cooperative game theory solved its allocative core in 1953 with the Shapley value, the unique division of a jointly produced surplus consistent with efficiency, symmetry, and indifference to everything except contribution. This paper asks what political economy looks like when that solution is taken seriously at the moment machine intelligence becomes a production factor. A minimal firm, solved exactly, shows naive growth attribution overstating the new hires' contribution more than fourfold and isolates a residue of the surplus, the three-way synergy, that belongs to no participant alone. A task-continuum production game over intelligence, compute, energy, and human labor, solved exactly along the whole automation path, shows total output multiplying sixfold while labor's share of attributed value collapses from all of it to an eighth, and it yields two structural facts the singularity discourse misses: the Shapley values of intelligence and its essential complements are forced equal by symmetry, so attribution cannot see which member of the stack is the clever one, and intelligence's share of value is capped at one-third by two essential complements, at 1/(k+1) by k, for any finite capability whatever. The Shapley singularity, intelligence's share of attributed value approaching one across frontier production games, is therefore unreachable by capability growth alone: it is an ownership event, a redrawing of the boundaries around the complements, rather than an intelligence event. A final pair of games locates the last human wage in verification, the best-attributed factor on the frontier until machine output certifies itself, after which labor's share falls threefold in one step, and exhibits the gap between the Shapley point and the core, between what each factor contributes and what its owner can stably extract, which is where politics lives. The frame is bounded: a Shapley value is an audit under a chosen value function, never a desert claim, and the choices of what counts as value and what follows from the audit remain political acts that no attribution mathematics can perform.
